# ==============================================================================
# NGINX REVERSE PROXY CONFIGURATION FOR 2U.TV AGENTIC OS
# ==============================================================================
# Save this file to: /etc/nginx/sites-available/os.2u.tv
# Symlink to active: ln -s /etc/nginx/sites-available/os.2u.tv /etc/nginx/sites-enabled/
# Run Let's Encrypt Certbot: certbot --nginx -d os.2u.tv -d agent.2u.tv

server {
    listen 80;
    server_name os.2u.tv agent.2u.tv;

    # Gzip Compression standard optimizations
    gzip on;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1000;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        
        # Enable WebSockets & Server-Sent Events headers
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        
        # Standard proxy parameters
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Custom Error Pages
    error_page 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
